networks:
  cicd-network:
    external: true

services:
  app:
    build: .
    image: planning-estiam:latest
    container_name: planning-estiam
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - planning-logs:/app/logs
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cicd-network
    restart: unless-stopped

volumes:
  planning-logs:
